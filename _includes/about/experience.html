<div class="col mt-4">
  <div class="timeline-body bg-themed">
    {% for item in site.data.experience %}
      <div class="timeline-item">
        <div class="content">
          <h5>{{ item.title }}</h5>
          <h6 class="subtitle">{{ item.subtitle }}</h6>
          <h6 class="date">{{ item.from }} — {{ item.to }}</h6>
          <ul>
              {% for desc in item.description %}
                <li>{{ desc }}</li>
              {% endfor %}
          </ul>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
